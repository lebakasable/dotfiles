theme = "catppuccin_mocha"

[editor]
line-number = "relative"
cursorline = true
# auto-completion = false
auto-format = false
color-modes = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

# [editor.indent-guides]
# render = true

[keys.normal]
g = { c = ":buffer-close!" }

[keys.insert]
C-n = "completion"
